defaults:
  - model
  - _self_

batch_size: 128

data:
  manifest_path: manifests/librilight_10h.jsonl
  sample_rate: 44100
  chunk_seconds: 4.0
  num_workers: 4
  pitch_cache_path: null  # set to manifests/pitch_cache/librilight_10h.npz to enable pitch loss

synth:
  ir_length: 256
  ir_impl: sequential

loss:
  # pitch_weight must be > 0 for pitch loss to fire; also needs
  # data.pitch_cache_path pointing at a precomputed npz.
  pitch_weight: 0.0

optim:
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  grad_clip: 1.0
  max_steps: 40000
  warmup_steps: 800

log:
  wandb_project: samuel
  wandb_entity: moboehle-kyutai
  wandb_mode: online
  log_every: 50
  val_every: 400
  eval_every: 400
  ckpt_every: 2000
  n_audio_samples: 4
  pitch_fmin: 70.0
  pitch_fmax: 500.0
  pitch_voiced_prob_threshold: 0.5

run:
  runs_root: runs
  name: ???
  seed: 0

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
