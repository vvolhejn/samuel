defaults:
  - model
  - _self_

batch_size: 64

data:
  manifest_path: manifests/librilight_1000h.jsonl
  pitch_cache_path: manifests/pitch_cache/librilight_1000h_spf512.npz
  sample_rate: 44100
  chunk_seconds: 4.0
  num_workers: 4
  val_fraction: 0.05

synth:
  ir_length: 256

optim:
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  grad_clip: 1.0
  max_steps: 10000
  warmup_steps: 800
  tau_start: 2.0
  tau_end: 0.5
  tau_anneal_steps: null  # default = max_steps

loss:
  mfcc: 1.0
  mel: 0.0
  stft: 0.0
  entropy: 1.0        # weight of the hinged entropy penalty
  entropy_floor: 1.0  # per-position entropy floor in nats; no pressure above it
  # 4x window overlap (n_fft=2048, hop=samples_per_frame=512). Null falls
  # back to n_fft=samples_per_frame (no overlap).
  mfcc_n_fft: 2048
  # SSL feature-matching (perceptual) loss
  ssl: 0.0
  # HF id. Others tried: facebook/hubert-base-ls960,
  # facebook/wav2vec2-base-960h, unclear which wins
  ssl_model: microsoft/wavlm-base-plus
  ssl_layer: 6
  ssl_distance: L1  # L1 | L2 | cosine
  # Frame-wise KL between CTC char posteriors of a frozen ASR (content-only
  # perceptual loss; no CTC marginalization needed since we have target audio)
  ctc: 0.0
  ctc_model: facebook/wav2vec2-base-960h

log:
  wandb_project: samuel
  wandb_entity: moboehle-kyutai
  wandb_mode: online
  log_every: 200
  eval_every: 1000
  ckpt_every: 2000
  n_eval_clips: 200
  # Eval-clip length (s). null -> match training (data.chunk_seconds). Set e.g.
  # 10.0 for finer WER/CER and sustained-intelligibility measurement.
  eval_chunk_seconds: 10.0
  n_audio_samples: 10
  pitch_fmin: 70.0
  pitch_fmax: 500.0
  pitch_voiced_prob_threshold: 0.5
  asr_whisper_size: base

run:
  runs_root: runs
  name: ???
  seed: 0

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
