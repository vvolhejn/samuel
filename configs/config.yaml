defaults:
  - model
  - _self_

batch_size: 96

data:
  manifest_path: manifests/librilight_1000h.jsonl
  pitch_cache_path: manifests/pitch_cache/librilight_1000h_spf512.npz
  sample_rate: 44100
  chunk_seconds: 4.0
  num_workers: 4
  val_fraction: 0.05

synth:
  ir_length: 256
  ir_impl: sequential
  enable_transients: false

optim:
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  grad_clip: 1.0
  max_steps: 10000
  warmup_steps: 800
  tau_start: 2.0
  tau_end: 0.5
  tau_anneal_steps: null  # default = max_steps

loss:
  mfcc: 1.0
  mel: 0.0
  stft: 0.0
  entropy: 0.01    # encourage softmax(logits) to stay near uniform
  # 4x window overlap (n_fft=2048, hop=samples_per_frame=512). Null falls
  # back to n_fft=samples_per_frame (no overlap).
  mfcc_n_fft: 2048
  onset_align: 0.1  # weight on the asymmetric onset-alignment loss
  onset_align_radius: 2

log:
  wandb_project: samuel
  wandb_entity: moboehle-kyutai
  wandb_mode: online
  log_every: 200
  val_every: 400
  eval_every: 400
  ckpt_every: 2000
  n_audio_samples: 4
  pitch_fmin: 70.0
  pitch_fmax: 500.0
  pitch_voiced_prob_threshold: 0.5

run:
  runs_root: runs
  name: ???
  seed: 0

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
