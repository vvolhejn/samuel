model:
  encoder:
    channels: 1
    dimension: 128
    n_filters: 32
    n_residual_layers: 3
    ratios: [8, 5, 4, 2]
    kernel_size: 7
    last_kernel_size: 7
    residual_kernel_size: 3
    dilation_base: 2
    pad_mode: constant
    compress: 2

  # 2048 samples = ~21.53 Hz at 44.1 kHz. Matches the loss hop and the
  # pitch-cache hop.
  samples_per_frame: 2048
  n_buckets: 8

  # (lo, hi, init) per trainable parameter. ``frequency`` is supplied
  # externally from the pyin cache; ``intensity`` is frozen at 1.0 and the
  # synth output is RMS-matched to the target post-hoc.
  param_spec:
    voiceness:            [0.0, 1.0, 0.6]
    tongueIndex:          [10.0, 35.0, 20.0]
    tongueDiameter:       [1.5, 3.5, 2.4]
    constrictionIndex:    [22.0, 44.0, 33.0]
    constrictionDiameter: [-0.5, 3.0, 1.25]

  frozen_values:
    intensity: 1.0
    vibratoWobble: 0.0
    vibratoFrequency: 6.0
    vibratoGain: 0.0
    tractLength: 44.0
