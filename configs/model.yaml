model:
  encoder:
    channels: 1
    dimension: 128
    n_filters: 32
    n_residual_layers: 3
    ratios: [8, 5, 4, 2]
    kernel_size: 7
    last_kernel_size: 7
    residual_kernel_size: 3
    dilation_base: 2
    pad_mode: constant
    compress: 2

  frame_rate: 12.5

  # (lo, hi, init) per trainable parameter. Values not listed here must appear
  # in `frozen_values` below; every Pink Trombone param must be covered.
  param_spec:
    noise:                [0.0, 0.5, 0.1]
    frequency:            [80.0, 400.0, 140.0]
    tenseness:            [0.0, 1.0, 0.6]
    intensity:            [0.0, 1.0, 1.0]
    loudness:             [0.0, 1.0, 1.0]
    tongueIndex:          [10.0, 35.0, 20.0]
    tongueDiameter:       [1.5, 3.5, 2.4]
    constrictionIndex:    [0.0, 44.0, 30.0]
    constrictionDiameter: [-0.5, 3.0, 3.0]

  frozen_values:
    vibratoWobble: 0.0
    vibratoFrequency: 6.0
    vibratoGain: 0.0
    tractLength: 44.0
